name: Maestro Android Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Cache Android emulator
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api30-${{ runner.os }}

      - name: Create AVD if not cached
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          ram-size: 2048M
          disk-size: 4096M
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: echo "AVD created"

      - name: Run Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          ram-size: 2048M
          disk-size: 4096M
          emulator-boot-timeout: 900
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect -wipe-data

          script: |
            echo "Device Ready"
            adb shell getprop ro.build.version.release

            echo "Unlock screen"
            adb shell input keyevent 82

            echo "Installing APK..."
            adb install -r app/mydemoapp.apk

            sleep 5

            echo "Running Maestro tests..."
            export MAESTRO_DRIVER_STARTUP_TIMEOUT=120000

            maestro test myappdemo/maestro_scripts --format junit --output report.xml

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.xml

      - name: Publish Results
        if: always()
        run: |
          echo "## Maestro Test Results" >> $GITHUB_STEP_SUMMARY

          if [ -f report.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' report.xml | grep -o '[0-9]*')
            TESTS=$(grep -o 'tests="[0-9]*"' report.xml | grep -o '[0-9]*')

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | ${TESTS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY

            if [ "${FAILURES:-0}" = "0" ]; then
              echo "### All tests passed!" >> $GITHUB_STEP_SUMMARY
            else
              echo "### Some tests failed!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No report found" >> $GITHUB_STEP_SUMMARY
          fi
