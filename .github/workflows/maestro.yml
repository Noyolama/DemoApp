name: Run Maestro Tests (Emulator)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" \
                     "platforms;android-30" \
                     "system-images;android-30;google_apis;x86"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd -n test_avd \
          -k "system-images;android-30;google_apis;x86" \
          --device "pixel"

      - name: Start Emulator (Lightweight)
        run: |
          nohup emulator -avd test_avd \
          -no-window -no-audio -no-boot-anim -accel off &
          
      - name: Wait for Emulator (SAFE)
        run: |
          adb wait-for-device
          timeout=180
          elapsed=0

          until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            if [ $elapsed -ge $timeout ]; then
              echo " Emulator failed to boot!"
              exit 1
            fi
            echo " Waiting for emulator..."
            sleep 5
            elapsed=$((elapsed+5))
          done

          adb shell input keyevent 82

      - name: Install APK
        run: |
          adb install app/mydemoapp.apk

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      - name: Run Maestro Tests
        run: |
          maestro test maestro-scripts/
