name: Run Maestro Tests (Emulator Stable)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      #  Setup Android SDK
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      #  Install Required SDK Packages (LIGHTWEIGHT)
      - name: Install SDK Packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" \
                     "platforms;android-30" \
                     "system-images;android-30;google_apis;x86"

      #  Create Emulator (AVD)
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd -n test_avd \
          -k "system-images;android-30;google_apis;x86" \
          --device "pixel"

      #  Start Emulator (OPTIMIZED)
      - name: Start Emulator
        run: |
          nohup emulator -avd test_avd \
          -no-window \
          -no-audio \
          -no-boot-anim \
          -gpu swiftshader_indirect \
          -no-snapshot \
          -no-metrics \
          -wipe-data \
          -accel off &

      # Wait for Emulator (SAFE + TIMEOUT)
      - name: Wait for Emulator to Boot
        run: |
          adb wait-for-device
          timeout=300
          elapsed=0

          until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            if [ $elapsed -ge $timeout ]; then
              echo " Emulator failed to boot!"
              exit 1
            fi
            echo " Waiting for emulator..."
            sleep 5
            elapsed=$((elapsed+5))
          done

          echo " Emulator booted!"
          adb shell input keyevent 82

      #  Install APK
      - name: Install APK
        run: |
          adb install app/mydemoapp.apk

      #  Install Maestro CLI
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      #  Run Maestro Tests
      - name: Run Maestro Tests
        run: |
          maestro test maestro-scripts/
