name: Run Maestro Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK Packages
        run: |
          yes | sdkmanager "platforms;android-33" "system-images;android-33;google_apis;x86_64" "build-tools;33.0.0"

      - name: Create and Start Emulator
        run: |
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-33;google_apis;x86_64" --force
          nohup emulator -avd test_avd -no-window -no-audio &

      - name: Wait for Emulator to Boot
        run: |
          adb wait-for-device
          boot_completed=""
          until [[ "$boot_completed" =~ "1" ]]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null)
            echo "Waiting for emulator to boot..."
            sleep 5
          done
          adb shell input keyevent 82

      - name: Install Maestro CLI
        run: |
          curl -sSfL https://install.maestro.mobile.dev | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro doctor

      - name: Install APK
        run: |
          adb install app/mydemoapp.apk

      - name: Run Maestro Tests
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test draw.yaml
          maestro test login.yaml
          maestro test sort.yaml
          maestro test addtocart.yaml
          maestro test sauce-demo.yaml
