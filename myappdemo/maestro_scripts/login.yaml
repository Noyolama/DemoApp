appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true

# Wait for app to fully render
- waitForAnimationToEnd

# Open menu
- tapOn:
    text: "View menu"

- tapOn: "Log In"

# ---- LOGIN 1 ----
- tapOn:
    id: nameRL
- inputText: bod@example.com

- tapOn:
    id: passwordET
- inputText: "10203040"

- hideKeyboard

- tapOn:
    text: "Login"