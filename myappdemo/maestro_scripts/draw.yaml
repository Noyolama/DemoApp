appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true
- tapOn: View menu
- tapOn: Drawing

#Drawing Rectangle
#Top line
- swipe:
    start: 100,500
    end: 400,500
    duration: 500

# Right line
- swipe:
    start: 400,500
    end: 400,800
    duration: 500

# Bottom line
- swipe:
    start: 400,800
    end: 100,800
    duration: 500

# Left line
- swipe:
    start: 100,800
    end: 100,500
    duration: 500
- tapOn: Clear
 


