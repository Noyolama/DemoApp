appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: View menu
    timeout: 10000    
- tapOn: View menu
- tapOn: Drawing

#Drawing Rectangle
#Top line
- waitForAnimationToEnd

- swipe:
    start: 100,500
    end: 400,500
    duration: 500

# Right line
- waitForAnimationToEnd

- swipe:
    start: 400,500
    end: 400,800
    duration: 500

# Bottom line
- waitForAnimationToEnd
- swipe:
    start: 400,800
    end: 100,800
    duration: 500

# Left line
- waitForAnimationToEnd
- swipe:
    start: 100,800
    end: 100,500
    duration: 500

 






